<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0d0d14"/>
  <title>No Zero Days</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --safe-t:env(safe-area-inset-top,44px);
      --safe-b:env(safe-area-inset-bottom,34px);
      --safe-l:env(safe-area-inset-left,0px);
      --safe-r:env(safe-area-inset-right,0px);
      --bg:#0d0d14;
      --bg2:#16161f;
      --bg3:#1d1d2a;
      --border:#252535;
      --border2:#2e2e44;
      --text:#f0f0f8;
      --text2:#c0c0e0;
      --text3:#6060a0;
      --text4:#3a3a60;
      --ac:#7ecba8;
      --ac-dark:#0d1a14;
      --red:#ff7b96;
      --amber:#ffb048;
      --green:#5fd4a0;
      --radius:14px;
      --radius-sm:10px;
      --tab-h:56px;
      --hdr-h:calc(var(--safe-t) + 56px);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}

    /* ── LOCK SCREEN ── */
    #lock{position:fixed;inset:0;z-index:100;background:linear-gradient(175deg,#0d0d14 0%,#130e22 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0}
    .lock-logo{font-size:52px;margin-bottom:20px;filter:drop-shadow(0 0 24px rgba(126,203,168,.5))}
    .lock-title{font-size:28px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;background:linear-gradient(135deg,#7ecba8,#aa96e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
    .lock-sub{font-size:14px;color:var(--text3);margin-bottom:36px;letter-spacing:.02em}
    .pin-dots{display:flex;gap:16px;margin-bottom:28px}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--text3);transition:background .15s,border-color .15s}
    .pin-dot.filled{background:var(--ac);border-color:var(--ac)}
    .pin-err{font-size:13px;color:var(--red);height:18px;text-align:center;margin-bottom:8px}
    .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:280px}
    .numpad-btn{height:70px;border-radius:16px;border:none;background:var(--bg3);color:var(--text);font-size:24px;font-weight:400;cursor:pointer;position:relative;overflow:hidden;letter-spacing:.02em;transition:background .12s}
    .numpad-btn:active{background:#2a2a3c}
    .numpad-btn.wide{font-size:16px;font-weight:600;letter-spacing:.04em}
    .numpad-btn.del{font-size:20px;background:rgba(255,123,150,.1)}
    .numpad-btn.del:active{background:rgba(255,123,150,.22)}

    /* ── APP SHELL ── */
    #app{display:none;flex-direction:column;height:100%;background:var(--bg);overflow:hidden}
    #app.visible{display:flex}

    /* Header */
    #hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:calc(var(--safe-t) + 10px) 14px 10px;display:flex;flex-direction:column;gap:8px}
    .tab-row{display:flex;gap:6px}
    .tab-btn{flex:1;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s}
    .tab-btn.active{font-weight:700}
    #t-personal{border-color:rgba(95,212,160,.3);color:#5fd4a0}
    #t-personal.active{background:rgba(95,212,160,.22);border-color:rgba(95,212,160,.55);color:#a8f0d4;backdrop-filter:blur(4px)}
    #t-work{border-color:rgba(120,174,240,.3);color:#78aef0}
    #t-work.active{background:rgba(120,174,240,.22);border-color:rgba(120,174,240,.55);color:#b8d6ff;backdrop-filter:blur(4px)}
    #t-log{border-color:rgba(170,150,224,.3);color:#aa96e0}
    #t-log.active{background:rgba(170,150,224,.22);border-color:rgba(170,150,224,.55);color:#cfc0f0;backdrop-filter:blur(4px)}
    #t-rules{border-color:rgba(244,200,105,.3);color:#f4c869}
    #t-rules.active{background:rgba(244,200,105,.22);border-color:rgba(244,200,105,.55);color:#f8dc9a;backdrop-filter:blur(4px)}
    #t-system{border-color:rgba(244,149,106,.3);color:#f4956a}
    #t-system.active{background:rgba(244,149,106,.22);border-color:rgba(244,149,106,.55);color:#f8b898;backdrop-filter:blur(4px)}
    .tab-btn.sm{flex:.65;font-size:12px}
    .view-row{display:flex;gap:6px}
    .view-btn{flex:1;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;transition:all .18s}
    .view-btn.active{background:var(--ac);border-color:var(--ac);color:var(--ac-dark);font-weight:700}

    /* Day nav */
    .day-nav{display:flex;align-items:center;gap:8px;padding:8px 14px 0}
    .nav-arrow{width:32px;height:32px;border:1px solid var(--border);border-radius:9px;background:var(--bg2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;transition:background .12s}
    .nav-arrow:active{background:#262636}
    .nav-center{flex:1;text-align:center}
    .today-pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--ac-dark);background:var(--ac);text-transform:uppercase;padding:2px 9px;border-radius:20px;margin-bottom:3px}
    .nav-date{font-size:15px;font-weight:700;color:var(--text);display:block}
    .go-today{display:block;margin:2px auto 0;padding:4px 14px;background:none;border:1px solid var(--ac);color:var(--ac);border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;width:fit-content}

    /* Per-task level descs */
    .l1{color:var(--red)}.l2{color:var(--amber)}.l3{color:var(--green)}
    .task-levels-toggle{display:flex;align-items:center;gap:5px;margin-top:5px;cursor:pointer;width:fit-content}
    .task-levels-toggle-label{font-size:11px;color:var(--text4);letter-spacing:.03em}
    .task-levels-toggle-arrow{font-size:10px;color:var(--text4);transition:transform .2s}
    .task-levels-toggle-arrow.open{transform:rotate(90deg)}
    .task-level-descs{display:none;flex-direction:column;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
    .task-level-descs.open{display:flex}
    .task-desc-row{display:flex;align-items:flex-start;gap:4px}
    .task-desc-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;width:32px;padding-top:7px}
    .task-desc-inp{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:#1a1a28;color:var(--text2);outline:none;transition:border-color .15s;-webkit-appearance:none;resize:none;overflow:visible;min-height:28px;line-height:1.4;width:0}
    .task-desc-inp:focus{border-color:var(--ac);background:var(--bg3)}
    .task-desc-inp::placeholder{color:var(--text4)}
    /* Editable task name */
    .task-name-inp{font-size:15px;font-weight:700;color:#e8e8f8;line-height:1.25;background:transparent;border:none;outline:none;width:100%;padding:0;-webkit-appearance:none}
    .task-name-inp:focus{border-bottom:1px solid var(--ac);color:var(--text)}
    /* Log entry actions */
    .log-entry-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .log-del{background:none;border:none;color:var(--text4);font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
    .log-del:active{color:var(--red)}
    /* Rules tab */
    .rules-wrap{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
    .rules-add-row{display:flex;gap:6px}
    .rules-inp{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:#1e1e2e;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
    .rules-inp:focus{border-color:var(--ac);background:var(--bg3)}
    .rules-inp::placeholder{color:var(--text4)}
    .rules-add-btn{padding:9px 14px;background:var(--ac);color:var(--ac-dark);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:800;cursor:pointer;flex-shrink:0}
    .rules-add-btn:active{opacity:.8}
    .rule-card{background:var(--bg3);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
    .rule-num{font-size:13px;font-weight:800;color:var(--ac);flex-shrink:0;margin-top:1px;min-width:22px}
    .rule-text{flex:1;font-size:14px;color:var(--text2);line-height:1.5;background:transparent;border:none;outline:none;resize:none;width:100%;overflow:hidden;min-height:22px;-webkit-appearance:none}
    .rule-text:focus{color:var(--text);border-bottom:1px solid var(--border2)}
    .rule-del{background:none;border:1px solid #3a1c30;color:#8a3050;border-radius:7px;width:24px;height:24px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
    .rule-del:active{background:#3a1530;color:var(--red)}
    .rules-empty{text-align:center;color:var(--text4);padding:36px 20px;font-size:14px;font-style:italic}

    /* Add task row */
    .add-row{display:flex;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
    .task-inp{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:#1e1e2e;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
    .task-inp:focus{border-color:var(--ac);background:var(--bg3)}
    .task-inp::placeholder{color:var(--text4)}
    .add-btn{padding:9px 14px;background:var(--ac);color:var(--ac-dark);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.02em;flex-shrink:0;white-space:nowrap}
    .add-btn:active{opacity:.8}

    /* Audit banner */
    .audit-banner{margin:8px 14px 4px;padding:10px 12px;background:rgba(255,176,72,.08);border:1px solid rgba(255,176,72,.25);border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px}
    .audit-text{flex:1;font-size:13px;color:#c09040;font-weight:500}
    .audit-x{background:none;border:none;color:#c09040;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}

    /* Scroll area */
    #main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-b) + 16px)}

    /* Task cards */
    .tasks-wrap{padding:8px 14px;display:flex;flex-direction:column;gap:6px}
    .task-card{background:var(--bg3);border-radius:var(--radius);padding:12px 12px 10px 14px;display:flex;align-items:flex-start;gap:10px;border-left:3px solid var(--border2);transition:border-color .2s;position:relative}
    .task-card[data-lv="1"]{border-left-color:var(--red)}
    .task-card[data-lv="2"]{border-left-color:var(--amber)}
    .task-card[data-lv="3"]{border-left-color:var(--green)}
    .task-main{flex:1;min-width:0}
    .task-name{font-size:15px;font-weight:700;color:#e8e8f8;line-height:1.25}
    .task-desc{display:block;width:100%;font-size:12px;color:var(--text4);background:transparent;border:none;outline:none;padding:3px 0 4px;line-height:1.4;resize:none}
    .task-desc:focus{color:var(--text3);border-bottom:1px solid #30306a}
    .task-desc::placeholder{color:#2a2a50;font-style:italic}
    .task-chips{display:flex;gap:5px;align-items:center;padding-top:3px;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-size:12px;font-weight:800;cursor:pointer;border:2px solid;transition:background .15s,transform .1s;user-select:none;-webkit-user-select:none;position:relative}
    .chip input{display:none}
    .chip:active{transform:scale(.88)}
    .chip1{border-color:var(--red);color:var(--red);background:rgba(255,123,150,.07)}
    .chip1.on{background:rgba(255,123,150,.22)}
    .chip2{border-color:var(--amber);color:var(--amber);background:rgba(255,176,72,.07)}
    .chip2.on{background:rgba(255,176,72,.22)}
    .chip3{border-color:var(--green);color:var(--green);background:rgba(95,212,160,.07)}
    .chip3.on{background:rgba(95,212,160,.22)}
    .del-btn{background:none;border:1px solid #3a1c30;color:#8a3050;border-radius:8px;width:26px;height:26px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:background .12s}
    .del-btn:active{background:#3a1530;color:var(--red)}
    .empty-msg{text-align:center;color:var(--text4);padding:36px 20px;font-size:14px;font-style:italic}

    /* Analytics */
    .ana-wrap{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
    .ana-period{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);padding:2px 0}
    .summary-card{background:var(--bg3);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:16px}
    .sum-num{font-size:44px;font-weight:900;color:var(--ac);line-height:1;letter-spacing:-.04em}
    .sum-den{font-size:16px;font-weight:400;color:var(--text4)}
    .sum-lbl{font-size:13px;color:var(--text3);line-height:1.5;max-width:160px}

    /* Week table */
    .week-table{background:var(--bg3);border-radius:var(--radius);padding:10px 12px;border:1px solid var(--border)}
    .wt-row{display:flex;align-items:center;gap:2px;padding:2px 0}
    .wt-hdr{border-bottom:1px solid #252535;padding-bottom:5px;margin-bottom:3px}
    .wt-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:600;color:#d0d0f0}
    .wt-hdr-name{flex:1}
    .wt-day-h{width:26px;text-align:center;font-size:9px;font-weight:700;color:var(--text4);text-transform:uppercase;flex-shrink:0}
    .wt-day-h.today-h{color:var(--ac)}
    .wt-dot{width:26px;text-align:center;flex-shrink:0;display:flex;justify-content:center;align-items:center;padding:4px 0}
    .wt-count{width:28px;text-align:right;font-size:11px;font-weight:700;color:var(--text4);flex-shrink:0}
    .dot-legend{display:flex;gap:10px;padding:6px 2px 2px;flex-wrap:wrap}
    .dot-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text4)}
    .dot{display:inline-block;width:11px;height:11px;border-radius:50%;flex-shrink:0}
    .dot.lg{width:14px;height:14px}
    .d0{background:#1e1e32}.d1{background:var(--red)}.d2{background:var(--amber)}.d3{background:var(--green)}

    /* Month card */
    .month-card{background:var(--bg3);border-radius:var(--radius);padding:10px 12px;border:1px solid var(--border)}
    .mc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .mc-name{font-size:14px;font-weight:700;color:#d0d0f0}
    .mc-stat{font-size:13px;font-weight:800;color:var(--ac)}
    .prog-bar{height:4px;background:#1a1a30;border-radius:2px;overflow:hidden;margin-bottom:8px}
    .prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .5s}
    .dot-grid{display:flex;flex-direction:column;gap:4px}
    .dot-week{display:flex;gap:4px}

    /* Log */
    .log-wrap{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
    .log-cta{background:var(--ac);color:var(--ac-dark);border:none;border-radius:var(--radius);padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;text-align:left;letter-spacing:.02em}
    .log-cta:active{opacity:.85}
    .log-entry{background:var(--bg3);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border)}
    .log-wk{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px}
    .log-sec{margin-top:6px}
    .log-q{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text4)}
    .log-ans{font-size:14px;color:var(--text2);margin-top:3px;line-height:1.5}
    .log-empty{text-align:center;color:var(--text4);padding:36px 20px;font-size:14px;font-style:italic}

    /* System */
    .sys-wrap{padding:10px 14px}
    .sys-note{font-size:13px;color:var(--text3);margin-bottom:12px}
    .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .photo-slot{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:1}
    .photo-img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;transition:opacity .15s}
    .photo-img:active{opacity:.85}
    .photo-lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(13,13,20,.75);padding:6px 8px;font-size:11px;font-weight:700;color:var(--text);text-align:center;backdrop-filter:blur(4px)}
    .photo-rm{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .photo-empty{width:100%;height:100%;background:var(--bg3);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--radius)}
    .photo-plus{font-size:32px;color:var(--text4)}

    /* Lightbox */
    .photo-lightbox{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:20px;gap:12px;position:relative}
    .lightbox-img{max-width:100%;max-height:80vh;border-radius:var(--radius);object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.7)}
    .lightbox-lbl{font-size:14px;font-weight:700;color:var(--text);letter-spacing:.04em;text-transform:uppercase;text-align:center}
    .lightbox-close{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .photo-rm-replace{right:32px}

    /* Modal */
    #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);padding:0}
    .modal-sheet{background:var(--bg2);border-radius:22px 22px 0 0;padding:20px 20px calc(var(--safe-b) + 20px);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
    .modal-handle{width:36px;height:5px;background:var(--border2);border-radius:3px;align-self:center;margin-bottom:4px}
    .modal-title{font-size:18px;font-weight:800;color:var(--text);letter-spacing:.02em}
    .modal-sub{font-size:13px;color:var(--text3);margin-top:-6px}
    .modal-q{font-size:14px;font-weight:700;color:#d0d0f0}
    .modal-hint{font-size:12px;color:var(--text4);margin-top:-8px;font-style:italic}
    .modal-ta{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:72px;background:var(--bg);color:#d0d0f0;line-height:1.5;-webkit-appearance:none}
    .modal-ta:focus{border-color:var(--ac)}
    .modal-ta::placeholder{color:var(--text4)}
    .modal-foot{display:flex;justify-content:space-between;align-items:center;padding-top:4px}
    .modal-skip{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer}
    .modal-save{background:var(--ac);color:var(--ac-dark);border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.02em}
    .modal-save:active{opacity:.8}

    /* Tab bar */
    #tabbar{flex-shrink:0;background:rgba(22,22,31,.95);border-top:1px solid var(--border);padding:8px calc(var(--safe-l) + 4px) calc(var(--safe-b) + 4px) calc(var(--safe-r) + 4px);display:flex;justify-content:space-around;backdrop-filter:blur(20px)}
    .tb-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 0;transition:opacity .15s;min-width:0}
    .tb-btn:active{opacity:.6}
    .tb-icon{font-size:22px;line-height:1;transition:transform .2s}
    .tb-label{font-size:10px;font-weight:600;letter-spacing:.03em;color:var(--text4);text-transform:uppercase;transition:color .18s}
    .tb-btn.active .tb-icon{transform:scale(1.1)}
    .tb-btn.active .tb-label{color:var(--ac)}

    /* Scrollbar hide */
    #main::-webkit-scrollbar{display:none}
    #main{scrollbar-width:none}
  </style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock">
  <div class="lock-logo">⚡</div>
  <h1 class="lock-title">No Zero Days</h1>
  <p class="lock-sub">Enter your PIN to unlock</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <div class="numpad">
    <button class="numpad-btn" type="button" onclick="pinKey('1')">1</button>
    <button class="numpad-btn" type="button" onclick="pinKey('2')">2</button>
    <button class="numpad-btn" type="button" onclick="pinKey('3')">3</button>
    <button class="numpad-btn" type="button" onclick="pinKey('4')">4</button>
    <button class="numpad-btn" type="button" onclick="pinKey('5')">5</button>
    <button class="numpad-btn" type="button" onclick="pinKey('6')">6</button>
    <button class="numpad-btn" type="button" onclick="pinKey('7')">7</button>
    <button class="numpad-btn" type="button" onclick="pinKey('8')">8</button>
    <button class="numpad-btn" type="button" onclick="pinKey('9')">9</button>
    <button class="numpad-btn wide" type="button" onclick="pinKey('0')" style="grid-column:2">0</button>
    <button class="numpad-btn del" type="button" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div id="hdr">
    <div class="tab-row">
      <button class="tab-btn" id="t-personal" data-tab="personal">Personal</button>
      <button class="tab-btn" id="t-work" data-tab="work">Work</button>
      <button class="tab-btn sm" id="t-log" data-tab="log">Log</button>
      <button class="tab-btn sm" id="t-rules" data-tab="rules">Rules</button>
      <button class="tab-btn sm" id="t-system" data-tab="system">System</button>
    </div>
    <div class="view-row" id="view-row">
      <button class="view-btn" id="v-day" data-view="day">Day</button>
      <button class="view-btn" id="v-week" data-view="week">Week</button>
      <button class="view-btn" id="v-month" data-view="month">Month</button>
    </div>
  </div>

  <!-- Main scroll -->
  <div id="main"></div>
</div>

<!-- Modal overlay -->
<div id="modal-overlay" style="display:none"></div>

<script>
'use strict';

// ── CONFIG ──
var PIN = '2518';
var STORAGE_KEY = 'tt_v2';

// ── PIN STATE ──
var pinBuffer = '';

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updateDots();
  if (pinBuffer.length === 4) {
    setTimeout(checkPin, 120);
  }
}
function pinDel() {
  if (pinBuffer.length > 0) {
    pinBuffer = pinBuffer.slice(0, -1);
    updateDots();
  }
}
function updateDots() {
  for (var i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}
function checkPin() {
  if (pinBuffer === PIN) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    init();
  } else {
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    pinBuffer = '';
    updateDots();
    setTimeout(function() { document.getElementById('pin-err').textContent = ''; }, 2500);
  }
}

// ── STATE ──
var state;

function blankState() {
  return {
    tab: 'personal', view: 'day', selectedDate: '',
    personal: { levelDescs: ['', '', ''], tasks: [] },
    work: { levelDescs: ['', '', ''], tasks: [] },
    weeklyResponses: [], weeklyInteracted: {}, weeklyDone: {},
    monthlyAuditDone: {}, systemPhotos: [null,null,null,null,null,null,null,null],
    rules: []
  };
}

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      var alts = ['tt_v1', 'tasktracker_v1'];
      for (var i = 0; i < alts.length; i++) {
        var lr = localStorage.getItem(alts[i]);
        if (lr) { raw = lr; break; }
      }
    }
    if (!raw) return blankState();
    var s = JSON.parse(raw), b = blankState();
    var vt = { personal:1, work:1, log:1, system:1, rules:1 };
    var sp = s.systemPhotos || [], photos = [];
    for (var pi = 0; pi < 8; pi++) photos.push(sp[pi] !== undefined ? sp[pi] : null);
    var pTasks = (s.personal && s.personal.tasks) ? s.personal.tasks : [];
    var wTasks = (s.work && s.work.tasks) ? s.work.tasks : [];
    // Migrate old tasks that don't have per-task levelDescs
    pTasks.forEach(function(t){ if(!t.levelDescs) t.levelDescs = ['','','']; });
    wTasks.forEach(function(t){ if(!t.levelDescs) t.levelDescs = ['','','']; });
    return {
      tab: (s.tab && vt[s.tab]) ? s.tab : b.tab,
      view: s.view || b.view,
      selectedDate: s.selectedDate || '',
      personal: {
        levelDescs: (s.personal && s.personal.levelDescs) ? s.personal.levelDescs : b.personal.levelDescs,
        tasks: pTasks
      },
      work: {
        levelDescs: (s.work && s.work.levelDescs) ? s.work.levelDescs : b.work.levelDescs,
        tasks: wTasks
      },
      weeklyResponses: s.weeklyResponses || [],
      weeklyInteracted: s.weeklyInteracted || {},
      weeklyDone: s.weeklyDone || {},
      monthlyAuditDone: s.monthlyAuditDone || {},
      systemPhotos: photos,
      rules: s.rules || []
    };
  } catch(e) { return blankState(); }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { alert('Storage full. Remove a photo to free space.'); }
}

// ── DATE HELPERS ──
var DAY_L = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var DAY_S = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var MON_L = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MON_3 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function today0() { var d = new Date(); d.setHours(0,0,0,0); return d; }
function dk(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function parseDK(s) {
  var p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function getWeekKey() {
  var t = today0(), dow = t.getDay(), mon = new Date(t);
  mon.setDate(t.getDate() - (dow === 0 ? 6 : dow - 1));
  return dk(mon);
}
function getWeekLabel(wk) {
  var p = wk.split('-'), mon = new Date(+p[0], +p[1]-1, +p[2]), sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return MON_3[mon.getMonth()] + ' ' + mon.getDate() + ' – ' + MON_3[sun.getMonth()] + ' ' + sun.getDate();
}
function getMonthKey() {
  var t = today0();
  return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0');
}
function isLastDayOfMonth() {
  var t = today0(), tm = new Date(t); tm.setDate(t.getDate()+1);
  return tm.getMonth() !== t.getMonth();
}
function getAnalyticsDays(vt) {
  var t = today0(), wo = (state.tab === 'work');
  if (vt === 'week') {
    var dow = t.getDay(), mon = new Date(t);
    mon.setDate(t.getDate() - (dow === 0 ? 6 : dow - 1));
    var days = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(mon); d.setDate(mon.getDate() + i);
      if (!wo || (d.getDay() > 0 && d.getDay() < 6)) days.push(d);
    }
    return days;
  } else {
    var yr = t.getFullYear(), mo = t.getMonth(), days2 = [];
    for (var d2 = new Date(yr,mo,1); d2.getMonth()===mo; d2.setDate(d2.getDate()+1)) {
      if (!wo || (d2.getDay()>0 && d2.getDay()<6)) days2.push(new Date(d2));
    }
    return days2;
  }
}
function groupByWeek(days) {
  if (!days.length) return [];
  var weeks = [], cur = [], curMon = null;
  for (var i = 0; i < days.length; i++) {
    var d = days[i], dow = d.getDay(), mon = new Date(d);
    mon.setDate(d.getDate() - (dow===0?6:dow-1));
    var mk = dk(mon);
    if (mk !== curMon) { if (cur.length) weeks.push(cur); cur = []; curMon = mk; }
    cur.push(d);
  }
  if (cur.length) weeks.push(cur);
  return weeks;
}

// ── ANALYTICS HELPERS ──
function getHighestLevel(task, ds) {
  for (var l = 3; l >= 1; l--) { if (task.completions[ds+'-'+l]) return l; }
  return 0;
}
function dotHtml(l, lg) {
  return '<span class="dot' + (lg?' lg':'') + ' d' + l + '"></span>';
}
function countNonZeroDays(tasks, days) {
  if (!tasks.length) return 0;
  var c = 0;
  for (var di = 0; di < days.length; di++) {
    var ds = dk(days[di]), all = true;
    for (var ti = 0; ti < tasks.length; ti++) {
      if (!tasks[ti].completions[ds+'-1']) { all = false; break; }
    }
    if (all && tasks.length) c++;
  }
  return c;
}
function countTaskNZ(task, days) {
  var c = 0;
  for (var di = 0; di < days.length; di++) {
    if (task.completions[dk(days[di])+'-1']) c++;
  }
  return c;
}

// ── THEME ──
var THEMES = {
  personal: '#7ecba8', work: '#78aef0',
  log: '#aa96e0', rules: '#f4c869', system: '#f4956a'
};

function applyTheme(tab) {
  var ac = THEMES[tab] || '#7ecba8';
  document.documentElement.style.setProperty('--ac', ac);
  var dark = (tab==='personal'||tab==='system') ? '#0d1a14' :
             (tab==='work') ? '#0a1022' :
             (tab==='rules') ? '#1a1500' : '#1a0d2e';
  document.documentElement.style.setProperty('--ac-dark', dark);
}

function ensureValidDate() {
  if (!state.selectedDate) { state.selectedDate = dk(today0()); return; }
  var d = parseDK(state.selectedDate);
  if (isNaN(d.getTime())) state.selectedDate = dk(today0());
  if (state.tab === 'work') {
    var dow = d.getDay();
    if (dow === 0 || dow === 6) {
      state.selectedDate = dk(today0());
      var ddow = parseDK(state.selectedDate).getDay();
      if (ddow === 0) state.selectedDate = dk(new Date(today0().getTime() + 86400000));
      if (ddow === 6) state.selectedDate = dk(new Date(today0().getTime() - 86400000));
    }
  }
}

// ── SET TAB / VIEW ──
function setTab(t) {
  state.tab = t; ensureValidDate(); save(); applyTheme(t); render();
}
function setView(v) {
  state.view = v; save(); render();
}

// ── RENDER ──
function render() {
  var tabs = ['personal','work','log','rules','system'];
  tabs.forEach(function(t) {
    var b = document.getElementById('t-' + t);
    if (b) b.classList.toggle('active', state.tab === t);
  });
  var isTrack = (state.tab === 'personal' || state.tab === 'work');
  var vr = document.getElementById('view-row');
  if (vr) vr.style.display = isTrack ? 'flex' : 'none';
  if (isTrack) {
    ['day','week','month'].forEach(function(v) {
      var b = document.getElementById('v-' + v);
      if (b) b.classList.toggle('active', state.view === v);
    });
    if (state.view === 'day') renderDay();
    else if (state.view === 'week') renderWeek();
    else renderMonth();
  } else if (state.tab === 'log') {
    renderLog();
  } else if (state.tab === 'rules') {
    renderRules();
  } else {
    renderSystem();
  }
  // Check prompts
  if (state.tab === 'log' || isTrack) checkWeeklyPrompt();
  checkMonthlyAudit();
}

// ── DAY VIEW ──
function renderDay() {
  var d = parseDK(state.selectedDate), t = today0();
  var isToday = (state.selectedDate === dk(t));
  var isFuture = (d > t);
  var dName = DAY_L[d.getDay()] + ', ' + MON_3[d.getMonth()] + ' ' + d.getDate();
  var mc = document.getElementById('main');

  // Day nav
  var navH = '<div class="day-nav">' +
    '<button class="nav-arrow" onclick="prevDay()">‹</button>' +
    '<div class="nav-center">' +
    (isToday ? '<span class="today-pill">TODAY</span><br>' : '') +
    '<span class="nav-date">' + dName + '</span>' +
    (!isToday ? '<button class="go-today" onclick="goToday()">← Today</button>' : '') +
    '</div>' +
    '<button class="nav-arrow" onclick="nextDay()">›</button>' +
    '</div>';

  // Add row — always visible; tasks are global, not day-specific
  var addH = '<div class="add-row">' +
    '<input class="task-inp" id="task-inp" type="text" placeholder="Add a task…" ' +
    'onkeydown="if(event.key===\'Enter\')addTask()" />' +
    '<button class="add-btn" onclick="addTask()">＋ Add</button>' +
    '</div>';

  // Audit banner
  var auditH = '';
  var mk = getMonthKey();
  if (isLastDayOfMonth() && !state.monthlyAuditDone[mk]) {
    auditH = '<div class="audit-banner"><span class="audit-text">📋 Monthly discipline audit — review your month</span><button class="audit-x" onclick="dismissAudit()">×</button></div>';
  }

  // Tasks
  var data = state[state.tab];
  var tasks = data.tasks;
  var lvColors = ['l1','l2','l3'];
  var lvPhs = ['e.g. Just stretch…','e.g. Also lift weights…','e.g. Also do cardio…'];
  var tasksH = '<div class="tasks-wrap">';
  if (!tasks.length) {
    tasksH += '<p class="empty-msg">No tasks yet. Add one above.</p>';
  } else {
    for (var ti = 0; ti < tasks.length; ti++) {
      var task = tasks[ti];
      var hl = getHighestLevel(task, state.selectedDate);
      var descVal = esc(task.description || '');
      var lvDescs = task.levelDescs || ['','',''];
      var hasAnyDesc = lvDescs[0] || lvDescs[1] || lvDescs[2];

      tasksH += '<div class="task-card" data-lv="' + hl + '" id="tc-' + task.id + '">' +
        '<div class="task-main">' +
        '<input class="task-name-inp" type="text" value="' + esc(task.name) + '" ' +
        'oninput="onTaskName(\'' + task.id + '\',this.value)" />' +
        '<input class="task-desc" type="text" value="' + descVal + '" placeholder="Add a note…" oninput="onTaskDesc(\'' + task.id + '\',this.value)" />';

      // Level descs toggle
      tasksH += '<div class="task-levels-toggle" onclick="toggleLevelDescs(\'' + task.id + '\')">' +
        '<span class="task-levels-toggle-label">Level descriptions</span>' +
        '<span class="task-levels-toggle-arrow" id="tla-' + task.id + '"' + (hasAnyDesc ? ' style="color:var(--ac)"' : '') + '>›</span>' +
        '</div>';

      // Level descs panel (hidden by default unless has content)
      tasksH += '<div class="task-level-descs" id="tld-' + task.id + '">';
      for (var li = 0; li < 3; li++) {
        var lv = esc(lvDescs[li] || '');
        tasksH += '<div class="task-desc-row">' +
          '<span class="task-desc-lbl ' + lvColors[li] + '">Lv ' + (li+1) + '</span>' +
          '<textarea class="task-desc-inp" rows="1" placeholder="' + lvPhs[li] + '" ' +
          'oninput="onTaskLevelDesc(\'' + task.id + '\',' + li + ',this.value);autoGrow(this)">' + lv + '</textarea></div>';
      }
      tasksH += '</div>';

      tasksH += '</div>' + // end task-main
        '<div class="task-chips">';
      for (var l = 1; l <= 3; l++) {
        var key = state.selectedDate + '-' + l;
        var checked = !!task.completions[key];
        // Show tooltip if level desc exists
        var lDesc = lvDescs[l-1] ? ' title="' + esc(lvDescs[l-1]) + '"' : '';
        tasksH += '<label class="chip chip' + l + (checked?' on':'') + '"' + lDesc + '>' +
          '<input type="checkbox" ' + (checked?'checked':'') +
          ' onchange="onCheck(\'' + task.id + '\',\'' + state.selectedDate + '\',' + l + ',this)" />' +
          l + '</label>';
      }
      tasksH += '</div>' +
        '<button class="del-btn" onclick="delTask(\'' + task.id + '\')">✕</button>' +
        '</div>';
    }
  }
  tasksH += '</div>';

  mc.innerHTML = navH + addH + auditH + tasksH;
  // Auto-grow any textareas in task level desc panels
  var tas = mc.querySelectorAll('textarea.task-desc-inp');
  for (var agi = 0; agi < tas.length; agi++) autoGrow(tas[agi]);
}

function prevDay() {
  var d = parseDK(state.selectedDate); d.setDate(d.getDate()-1);
  if (state.tab === 'work') { while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()-1); }
  state.selectedDate = dk(d); save(); renderDay();
}
function nextDay() {
  var d = parseDK(state.selectedDate); d.setDate(d.getDate()+1);
  if (state.tab === 'work') { while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1); }
  state.selectedDate = dk(d); save(); renderDay();
}
function goToday() { state.selectedDate = dk(today0()); save(); renderDay(); }

function toggleLevelDescs(taskId) {
  var panel = document.getElementById('tld-' + taskId);
  var arrow = document.getElementById('tla-' + taskId);
  if (!panel) return;
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  if (arrow) {
    arrow.classList.toggle('open', !isOpen);
  }
}

// ── WEEK VIEW ──
function renderWeek() {
  var mc = document.getElementById('main');
  var days = getAnalyticsDays('week'), tasks = state[state.tab].tasks;
  var todayK = dk(today0());
  var a = days[0], b = days[days.length-1];
  var period = 'Week of ' + MON_3[a.getMonth()] + ' ' + a.getDate() + ' – ' + MON_3[b.getMonth()] + ' ' + b.getDate();
  var nz = countNonZeroDays(tasks, days);
  var zeroDays = days.length - nz;
  var h = '<div class="ana-wrap"><div class="ana-period">' + period + '</div>';

  // Summary
  h += '<div class="summary-card"><div><span class="sum-num" style="color:' + (zeroDays===0?'var(--green)':'var(--red)') + '">' + zeroDays + '</span><span class="sum-den"> / ' + days.length + '</span></div>' +
    '<div class="sum-lbl">Zero days this week' + (zeroDays === 0 ? ' — perfect week! 🔥' : '') + '</div></div>';

  if (tasks.length) {
    // Week table header
    h += '<div class="week-table"><div class="wt-row wt-hdr"><div class="wt-hdr-name"></div>';
    for (var di = 0; di < days.length; di++) {
      var isT = (dk(days[di]) === todayK);
      h += '<div class="wt-day-h' + (isT?' today-h':'') + '">' + DAY_S[days[di].getDay()] + '</div>';
    }
    h += '<div class="wt-count"></div></div>';

    for (var ti = 0; ti < tasks.length; ti++) {
      var task = tasks[ti];
      var tnz = countTaskNZ(task, days);
      h += '<div class="wt-row"><div class="wt-name">' + esc(task.name) + '</div>';
      for (var di2 = 0; di2 < days.length; di2++) {
        h += '<div class="wt-dot">' + dotHtml(getHighestLevel(task, dk(days[di2])), true) + '</div>';
      }
      h += '<div class="wt-count">' + tnz + '</div></div>';
    }

    h += '<div class="dot-legend">';
    var legends = ['None','Level 1','Level 2','Level 3'];
    for (var dl = 0; dl <= 3; dl++) {
      h += '<div class="dot-legend-item">' + dotHtml(dl, false) + ' ' + legends[dl] + '</div>';
    }
    h += '</div></div>';
  } else {
    h += '<p class="empty-msg">No tasks yet. Add some in Day view.</p>';
  }
  h += '</div>';
  mc.innerHTML = h;
}

// ── MONTH VIEW ──
function renderMonth() {
  var mc = document.getElementById('main');
  var days = getAnalyticsDays('month'), tasks = state[state.tab].tasks;
  var t = today0();
  var nz = countNonZeroDays(tasks, days);
  var zeroDays = days.length - nz;
  var h = '<div class="ana-wrap">';
  h += '<div class="ana-period">' + MON_L[t.getMonth()] + ' ' + t.getFullYear() + '</div>';
  h += '<div class="summary-card"><div><span class="sum-num" style="color:' + (zeroDays===0?'var(--green)':'var(--red)') + '">' + zeroDays + '</span><span class="sum-den"> / ' + days.length + '</span></div>' +
    '<div class="sum-lbl">Zero days this month' + (zeroDays === 0 ? ' — perfect month! 🔥' : '') + '</div></div>';

  if (tasks.length) {
    for (var ti = 0; ti < tasks.length; ti++) {
      var task = tasks[ti];
      var tnz = countTaskNZ(task, days);
      var pct = days.length ? Math.round(tnz/days.length*100) : 0;
      h += '<div class="month-card"><div class="mc-hdr"><span class="mc-name">' + esc(task.name) + '</span><span class="mc-stat">' + tnz + '/' + days.length + '</span></div>' +
        '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="dot-grid">';
      var weeks = groupByWeek(days);
      for (var wi = 0; wi < weeks.length; wi++) {
        h += '<div class="dot-week">';
        for (var di = 0; di < weeks[wi].length; di++) {
          h += dotHtml(getHighestLevel(task, dk(weeks[wi][di])), false);
        }
        h += '</div>';
      }
      h += '</div></div>';
    }
  } else {
    h += '<p class="empty-msg">No tasks yet. Add some in Day view.</p>';
  }
  h += '</div>';
  mc.innerHTML = h;
}

// ── LOG VIEW ──
function renderLog() {
  var mc = document.getElementById('main');
  var wk = getWeekKey();
  var h = '<div class="log-wrap">';
  if (!state.weeklyDone[wk]) {
    h += '<button class="log-cta" onclick="showWeeklyModal(\'' + wk + '\')">+ Fill in this week\'s check-in →</button>';
  }
  if (!state.weeklyResponses.length) {
    h += '<p class="log-empty">No entries yet. Check-ins appear each Sunday.</p>';
  } else {
    for (var i = state.weeklyResponses.length-1; i >= 0; i--) {
      var r = state.weeklyResponses[i];
      h += '<div class="log-entry">' +
        '<div class="log-entry-hdr">' +
        '<div class="log-wk">' + esc(r.weekLabel || r.week) + '</div>' +
        '<div style="display:flex;gap:8px">' +
        '<button class="log-del" onclick="editLogEntry(' + i + ')" title="Edit">✏️</button>' +
        '<button class="log-del" onclick="deleteLogEntry(' + i + ')" title="Delete">✕</button>' +
        '</div></div>' +
        '<div class="log-sec"><div class="log-q">What made it hard?</div>' +
        '<div class="log-ans">' + (r.hard ? esc(r.hard) : '—') + '</div></div>' +
        '<div class="log-sec"><div class="log-q">Adjustment</div>' +
        '<div class="log-ans">' + (r.adjustment ? esc(r.adjustment) : '—') + '</div></div>' +
        '</div>';
    }
  }
  h += '</div>';
  mc.innerHTML = h;
}

// ── SYSTEM VIEW ──
var SYS_LABELS = ['','','','','','','',''];

function renderSystem() {
  var mc = document.getElementById('main');
  var h = '<div class="sys-wrap"><p class="sys-note">Your discipline system. Tap a slot to add a photo.</p><div class="photo-grid">';
  for (var i = 0; i < 8; i++) {
    var up = state.systemPhotos[i];
    h += '<div class="photo-slot">';
    if (up) {
      h += '<img class="photo-img" src="' + up + '" onclick="viewPhoto(' + i + ')" />';
      if (SYS_LABELS[i]) h += '<div class="photo-lbl">' + SYS_LABELS[i] + '</div>';
      h += '<button class="photo-rm photo-rm-replace" onclick="triggerUpload(' + i + ')" title="Replace">↺</button>';
      h += '<button class="photo-rm" style="top:6px;right:32px" onclick="removePhoto(' + i + ')" title="Remove">✕</button>';
    } else {
      h += '<div class="photo-empty" onclick="triggerUpload(' + i + ')">' +
        (SYS_LABELS[i] ? '<span style="font-size:11px;color:var(--text4);text-align:center;padding:8px;line-height:1.3">' + SYS_LABELS[i] + '</span>' : '<span class="photo-plus">+</span>') +
        '</div>';
    }
    h += '</div>';
  }
  h += '</div><input type="file" id="photo-file-inp" accept="image/*" style="display:none"/></div>';
  mc.innerHTML = h;
  var fi = document.getElementById('photo-file-inp');
  if (fi) fi.addEventListener('change', function() {
    var idx = parseInt(fi.dataset.idx);
    if (!isNaN(idx) && fi.files[0]) uploadPhoto(idx, fi.files[0]);
  });
}

function triggerUpload(idx) {
  var fi = document.getElementById('photo-file-inp');
  if (!fi) return; fi.dataset.idx = idx; fi.value = ''; fi.click();
}
function uploadPhoto(idx, file) {
  var img = new Image(), url = URL.createObjectURL(file);
  img.onload = function() {
    URL.revokeObjectURL(url);
    var MAX = 700, w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h*MAX/w); w = MAX; }
      else { w = Math.round(w*MAX/h); h = MAX; }
    }
    var c = document.createElement('canvas'); c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    state.systemPhotos[idx] = c.toDataURL('image/jpeg', 0.72);
    save(); renderSystem();
  };
  img.onerror = function() { URL.revokeObjectURL(url); };
  img.src = url;
}
function removePhoto(idx) { state.systemPhotos[idx] = null; save(); renderSystem(); }

function viewPhoto(idx) {
  var src = state.systemPhotos[idx];
  if (!src) return;
  var lbl = SYS_LABELS[idx] || '';
  var overlay = document.getElementById('modal-overlay');
  overlay.innerHTML = '<div class="photo-lightbox" onclick="closeModal()">' +
    '<img src="' + src + '" class="lightbox-img" onclick="event.stopPropagation()" />' +
    (lbl ? '<div class="lightbox-lbl">' + lbl + '</div>' : '') +
    '<button class="lightbox-close" onclick="closeModal()">✕</button>' +
    '</div>';
  overlay.style.display = 'flex';
}

// ── TASK ACTIONS ──
function addTask() {
  var inp = document.getElementById('task-inp'); if (!inp) return;
  var name = inp.value.trim(); if (!name) return;
  state[state.tab].tasks.push({ id: String(Date.now()), name: name, description: '', levelDescs: ['','',''], completions: {} });
  save(); inp.value = ''; renderDay();
}
function delTask(id) {
  if (!confirm('Delete this task?')) return;
  state[state.tab].tasks = state[state.tab].tasks.filter(function(t) { return t.id !== id; });
  save(); renderDay();
}
function onCheck(taskId, dateStr, level, cb) {
  var tasks = state[state.tab].tasks, task = null;
  for (var i = 0; i < tasks.length; i++) { if (tasks[i].id === taskId) { task = tasks[i]; break; } }
  if (!task) return;
  var key = dateStr + '-' + level;
  if (cb.checked) task.completions[key] = true; else delete task.completions[key];
  save();
  var label = cb.parentElement;
  label.classList.toggle('on', cb.checked);
  var card = document.getElementById('tc-' + taskId);
  if (card) card.setAttribute('data-lv', getHighestLevel(task, dateStr));
}
function onTaskName(taskId, value) {
  var tasks = state[state.tab].tasks;
  for (var i = 0; i < tasks.length; i++) {
    if (tasks[i].id === taskId) { tasks[i].name = value; break; }
  }
  save();
}

// ── LOG ENTRY ACTIONS ──
function deleteLogEntry(idx) {
  if (!confirm('Delete this check-in?')) return;
  var r = state.weeklyResponses[idx];
  if (r) {
    delete state.weeklyDone[r.week];
    delete state.weeklyInteracted[r.week];
  }
  state.weeklyResponses.splice(idx, 1);
  save(); renderLog();
}
function editLogEntry(idx) {
  var r = state.weeklyResponses[idx];
  if (!r) return;
  var overlay = document.getElementById('modal-overlay');
  overlay.innerHTML = '<div class="modal-sheet">' +
    '<div class="modal-handle"></div>' +
    '<div class="modal-title">Edit Check-in ✏️</div>' +
    '<div class="modal-sub">' + esc(r.weekLabel || r.week) + '</div>' +
    '<div class="modal-q">What made this week hard?</div>' +
    '<textarea class="modal-ta" id="wk-hard" rows="3">' + esc(r.hard || '') + '</textarea>' +
    '<div class="modal-q">One adjustment for next week</div>' +
    '<textarea class="modal-ta" id="wk-adj" rows="3">' + esc(r.adjustment || '') + '</textarea>' +
    '<div class="modal-foot">' +
    '<button class="modal-skip" onclick="closeModal()">Cancel</button>' +
    '<button class="modal-save" onclick="saveEditedLog(' + idx + ')">Save</button>' +
    '</div></div>';
  overlay.style.display = 'flex';
}
function saveEditedLog(idx) {
  var he = document.getElementById('wk-hard'), ae = document.getElementById('wk-adj');
  if (!state.weeklyResponses[idx]) return;
  state.weeklyResponses[idx].hard = he ? he.value.trim() : '';
  state.weeklyResponses[idx].adjustment = ae ? ae.value.trim() : '';
  save(); closeModal(); renderLog();
}

// ── RULES VIEW ──
function renderRules() {
  var mc = document.getElementById('main');
  var h = '<div class="rules-wrap">' +
    '<div class="rules-add-row">' +
    '<input class="rules-inp" id="rule-inp" type="text" placeholder="Add a rule…" ' +
    'onkeydown="if(event.key===\'Enter\')addRule()" />' +
    '<button class="rules-add-btn" onclick="addRule()">＋ Add</button>' +
    '</div>';
  if (!state.rules.length) {
    h += '<p class="rules-empty">No rules yet. Add your non-negotiables above.</p>';
  } else {
    for (var i = 0; i < state.rules.length; i++) {
      h += '<div class="rule-card">' +
        '<span class="rule-num">' + (i+1) + '</span>' +
        '<textarea class="rule-text" rows="1" ' +
        'oninput="onRuleText(' + i + ',this.value);autoGrow(this)">' + esc(state.rules[i]) + '</textarea>' +
        '<button class="rule-del" onclick="deleteRule(' + i + ')">✕</button>' +
        '</div>';
    }
  }
  h += '</div>';
  mc.innerHTML = h;
  // Auto-grow existing textareas
  var tas = mc.querySelectorAll('textarea');
  for (var ti = 0; ti < tas.length; ti++) autoGrow(tas[ti]);
}
function addRule() {
  var inp = document.getElementById('rule-inp'); if (!inp) return;
  var text = inp.value.trim(); if (!text) return;
  if (!state.rules) state.rules = [];
  state.rules.push(text);
  save(); inp.value = ''; renderRules();
}
function deleteRule(idx) {
  state.rules.splice(idx, 1);
  save(); renderRules();
}
function onRuleText(idx, value) {
  if (!state.rules) state.rules = [];
  state.rules[idx] = value;
  save();
}

// ── AUTO-GROW TEXTAREA ──
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function onTaskLevelDesc(taskId, lvIdx, value) {
  var tasks = state[state.tab].tasks;
  for (var i = 0; i < tasks.length; i++) {
    if (tasks[i].id === taskId) {
      if (!tasks[i].levelDescs) tasks[i].levelDescs = ['','',''];
      tasks[i].levelDescs[lvIdx] = value;
      break;
    }
  }
  save();
}
function onTaskDesc(taskId, value) {
  var tasks = state[state.tab].tasks;
  for (var i = 0; i < tasks.length; i++) {
    if (tasks[i].id === taskId) { tasks[i].description = value; break; }
  }
  save();
}

// ── WEEKLY PROMPT ──
function checkWeeklyPrompt() {
  var today = today0();
  if (today.getDay() !== 0) return;
  var wk = getWeekKey();
  if (!state.weeklyInteracted[wk]) showWeeklyModal(wk);
}
function showWeeklyModal(wk) {
  var overlay = document.getElementById('modal-overlay');
  overlay.innerHTML = '<div class="modal-sheet">' +
    '<div class="modal-handle"></div>' +
    '<div class="modal-title">Weekly Check-in ✍️</div>' +
    '<div class="modal-sub">' + getWeekLabel(wk) + '</div>' +
    '<div class="modal-q">What made this week hard?</div>' +
    '<div class="modal-hint">Friction, obstacles, mental barriers…</div>' +
    '<textarea class="modal-ta" id="wk-hard" placeholder="This week I struggled with…" rows="3"></textarea>' +
    '<div class="modal-q">One adjustment for next week</div>' +
    '<textarea class="modal-ta" id="wk-adj" placeholder="Next week I will…" rows="3"></textarea>' +
    '<div class="modal-foot">' +
    '<button class="modal-skip" onclick="skipWeekly()">Skip</button>' +
    '<button class="modal-save" onclick="saveWeekly(\'' + wk + '\')">Save check-in</button>' +
    '</div></div>';
  overlay.style.display = 'flex';
}
function skipWeekly() {
  state.weeklyInteracted[getWeekKey()] = true; save(); closeModal();
}
function saveWeekly(wk) {
  var he = document.getElementById('wk-hard'), ae = document.getElementById('wk-adj');
  var hard = he ? he.value.trim() : '', adj = ae ? ae.value.trim() : '';
  state.weeklyResponses.push({ week: wk, weekLabel: getWeekLabel(wk), hard: hard, adjustment: adj });
  state.weeklyDone[wk] = true;
  state.weeklyInteracted[wk] = true;
  save(); closeModal();
  if (state.tab === 'log') renderLog();
}
function closeModal() {
  var overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'none'; overlay.innerHTML = '';
}

// ── MONTHLY AUDIT ──
function checkMonthlyAudit() {} // handled inline in renderDay
function dismissAudit() {
  state.monthlyAuditDone[getMonthKey()] = true; save(); renderDay();
}

// ── UTILS ──
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── PRESET PHOTOS — removed, users upload their own ──
var PRESET_PHOTOS = [null,null,null,null,null,null,null,null];

// ── INIT ──
function init() {
  state = loadState();
  ensureValidDate();
  applyTheme(state.tab);
  render();

  // Swipe to navigate days
  var mc = document.getElementById('main');
  var touchStartX = 0, touchStartY = 0;
  mc.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  mc.addEventListener('touchend', function(e) {
    if ((state.tab !== 'personal' && state.tab !== 'work') || state.view !== 'day') return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) nextDay(); else prevDay();
    }
  }, { passive: true });
}

// ── BOOTSTRAP — wire up all static listeners ──
document.addEventListener('DOMContentLoaded', function() {

  // PIN numpad — handled via inline onclick on each button

  // Also support keyboard on desktop
  document.addEventListener('keydown', function(e) {
    var lock = document.getElementById('lock');
    if (!lock || lock.style.display === 'none') return;
    if (e.key >= '0' && e.key <= '9') pinKey(e.key);
    if (e.key === 'Backspace') pinDel();
  });

  // Tab buttons
  var tabRow = document.querySelector('.tab-row');
  if (tabRow) {
    tabRow.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-tab]');
      if (btn) setTab(btn.getAttribute('data-tab'));
    });
  }

  // View buttons
  var viewRow = document.getElementById('view-row');
  if (viewRow) {
    viewRow.addEventListener('click', function(e) {
      var btn = e.target.closest('[data-view]');
      if (btn) setView(btn.getAttribute('data-view'));
    });
  }
});
</script>
